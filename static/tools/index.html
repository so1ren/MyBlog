<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工具箱 | caiyu.life</title>
  <style>
    :root {
      --bg:              oklch(98% 0.010 80);
      --surface:         oklch(96% 0.010 80);
      --surface2:        oklch(93% 0.02  240);
      --text:            oklch(22% 0.015 50);
      --text2:           oklch(52% 0.015 50);
      --accent:          oklch(48% 0.10  240);
      --accent-hover:    oklch(40% 0.12  240);
      --border:          oklch(88% 0.008 80);
      --shadow-sm:       0 1px 3px oklch(0% 0 0 / 0.06);
      --radius:          6px;
      --t-fast:          0.15s cubic-bezier(0.25, 1, 0.5, 1);
      --t-smooth:        0.25s cubic-bezier(0.25, 1, 0.5, 1);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:            oklch(18% 0.015 250);
        --surface:       oklch(22% 0.015 250);
        --surface2:      oklch(30% 0.08  240);
        --text:          oklch(90% 0.008 250);
        --text2:         oklch(70% 0.010 250);
        --accent:        oklch(65% 0.12  240);
        --accent-hover:  oklch(72% 0.10  240);
        --border:        oklch(30% 0.012 250);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'LXGW', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 2.5rem 2rem; }

    header {
      text-align: center;
      padding: 2.5rem 0 2rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2.5rem;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: -0.02em;
    }
    header p {
      color: var(--text2);
      margin-top: 0.5rem;
      font-size: 0.95rem;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      color: var(--text2);
      font-size: 0.85rem;
      text-decoration: none;
      margin-bottom: 1rem;
      transition: color var(--t-fast);
    }
    .back-link:hover { color: var(--accent); }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .tool-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
      box-shadow: var(--shadow-sm);
      transition: all var(--t-smooth);
      text-decoration: none;
      color: inherit;
      display: block;
      animation: fadeInUp 0.4s var(--t-smooth) forwards;
    }
    .tool-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px oklch(0% 0 0 / 0.08);
    }
    .tool-card .icon {
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
    }
    .tool-card h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.4rem;
    }
    .tool-card p {
      font-size: 0.9rem;
      color: var(--text2);
      line-height: 1.6;
    }
    .tool-card .tag {
      display: inline-block;
      margin-top: 0.75rem;
      padding: 0.2rem 0.6rem;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--accent);
      background: oklch(70% 0.05 240 / 0.15);
      border-radius: 4px;
    }

    footer {
      text-align: center;
      padding: 2.5rem;
      color: var(--text2);
      font-size: 0.85rem;
      border-top: 1px solid var(--border);
      margin-top: 2.5rem;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← 回到首页</a>
    <header>
      <h1>工具箱</h1>
      <p>纯前端数据处理工具，数据不上传服务器</p>
    </header>

    <div class="tools-grid">
      <a href="/tools/txt-chart/" class="tool-card">
        <div class="icon">📈</div>
        <h3>TXT 数据可视化</h3>
        <p>拖拽上传 TXT 文件，自动生成折线图。支持批量上传、多文件叠加对比、数据范围裁剪。</p>
        <span class="tag">数据可视化</span>
      </a>

      <a href="/echem-analyzer/" class="tool-card">
        <div class="icon">⚡</div>
        <h3>EChem Analyzer</h3>
        <p>电化学测试数据自动化处理工具。支持 CV / EIS 数据提取与 Origin 格式输出。</p>
        <span class="tag">电化学</span>
      </a>
    </div>

    <footer>
      caiyu.life · 工具箱 · 本地处理，数据安全
    </footer>
  </div>
</body>
</html>
