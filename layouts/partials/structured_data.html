{{- /* JSON-LD 结构化数据 */ -}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": {{ .Title | jsonify }},
  "description": {{ .Description | default (substr .Summary 0 150) | jsonify }},
  "image": "{{ with .Params.images }}{{ index . 0 | absURL }}{{ else }}{{ with site.Params.assets }}{{ with .favicon }}{{ absURL . }}{{ end }}{{ end }}{{ end }}",
  "datePublished": "{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}",
  "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}",
  "author": {
    "@type": "Person",
    "name": "{{ site.Params.author }}",
    "url": "{{ site.BaseURL }}"
  },
  "publisher": {
    "@type": "Organization",
    "name": "{{ site.Title }}",
    "logo": {
      "@type": "ImageObject",
      "url": "{{ with site.Params.assets.favicon }}{{ absURL . }}{{ end }}"
    }
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ .Permalink }}"
  },
  "wordCount": {{ .WordCount }},
  "articleSection": {{ with .Section }}"{{ . }}"{{ else }}"posts"{{ end }},
  "inLanguage": "{{ site.Language.LanguageCode }}"
}
</script>
