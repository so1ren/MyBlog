{{- /* Giscus 评论系统 */ -}}
{{- /* 使用说明：访问 https://giscus.app/zh-CN 获取 repoID 和 categoryID */ -}}
{{- $giscus := site.Params.giscus | default dict -}}
{{- if $.Params.comments | default true }}
<div id="giscus-comments" class="giscus-wrapper">
  <script src="https://giscus.app/client.js"
          data-repo="{{ $giscus.repo | default "so1ren/MyBlog" }}"
          data-repo-id="{{ $giscus.repoID | default "YOUR_REPO_ID" }}"
          data-category="{{ $giscus.category | default "Announcements" }}"
          data-category-id="{{ $giscus.categoryID | default "YOUR_CATEGORY_ID" }}"
          data-mapping="{{ $giscus.mapping | default "pathname" }}"
          data-strict="0"
          data-reactions-enabled="{{ $giscus.reactionsEnabled | default "1" }}"
          data-emit-metadata="{{ $giscus.emitMetadata | default "0" }}"
          data-input-position="{{ $giscus.inputPosition | default "bottom" }}"
          data-theme="{{ $giscus.theme | default "preferred_color_scheme" }}"
          data-lang="{{ $giscus.lang | default "zh-CN" }}"
          crossorigin="anonymous"
          async>
  </script>
</div>
{{- end }}
