    * {

    .file-item:hover {

    }

    .file-item .file-icon {
      flex-shrink: 0;

      border-radius: var(--radius-sm);
      color: var(--accent);

      font-weight: 600;

    .file-item .file-info {

    .file-item .file-name {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-item .file-meta {
      font-size: 12px;
      color: var(--text-muted);
    }

    .file-item .file-status {
      flex-shrink: 0;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: var(--radius-sm);
      font-weight: 500;
    }

    .file-item .file-status.ok {
      color: oklch(55% 0.15 150);
      background: oklch(60% 0.10 150 / 0.10);
    }

    .file-item .file-status.error {
      color: var(--danger);
      background: rgba(239, 68, 68, 0.08);
    }

    .file-item .file-remove {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      color: var(--text-faint);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 16px;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .file-item .file-remove:hover {
      background: rgba(239, 68, 68, 0.08);
      color: var(--danger);
    }

    .clear-all {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .clear-all:hover {
      color: var(--danger);
      border-color: var(--danger);
      background: rgba(239, 68, 68, 0.05);
    }

    .error-banner {
      padding: 12px 16px;
      background: rgba(239, 68, 68, 0.06);

      font-size: 13px;
      color: var(--danger);
    }

    .chart-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
      gap: 20px;
    }

    @media (max-width: 640px) {
      .chart-grid {
        grid-template-columns: 1fr;
      }
    }

    .chart-card {

    .empty-state {

      flex-shrink: 0;
    }

      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-overlay:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }

    .btn-overlay:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #overlaySection .chart-card {
      border: 2px solid var(--accent);

    }

    .chart-hint {

      margin-top: 8px;
      user-select: none;
    }

    .minimap-wrap {
      position: relative;
      height: 36px;
      margin-top: 12px;
      background: transparent;
      border-bottom: 1px solid var(--border);
      overflow: visible;
      cursor: crosshair;
    }
    .minimap-wrap canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .minimap-range {
      position: absolute;
      top: 0;
      bottom: 0;
      background: oklch(48% 0.10 240 / 0.06);
      cursor: grab;
      transition: left 0.1s ease, width 0.1s ease;
    }
    html.dark .minimap-range {
      background: oklch(65% 0.12 240 / 0.10);
    }
    .minimap-range:active {
      cursor: grabbing;
      transition: none;
    }
    .minimap-handle {
      position: absolute;
      top: 50%;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      transform: translate(-50%, -50%);
      transition: transform 0.2s ease, width 0.2s ease, height 0.2s ease;
      cursor: ew-resize;
      z-index: 10;
    }
    .minimap-handle:hover {
      transform: translate(-50%, -50%) scale(1.5);
    }
    .minimap-handle.left { left: 0; }
    .minimap-handle.right { right: 0; transform: translate(50%, -50%); }
    .minimap-handle.right:hover {
      transform: translate(50%, -50%) scale(1.5);
    }
    .minimap-label-left,
    .minimap-label-right {
      position: absolute;
      bottom: -16px;

      color: var(--text-faint);
      white-space: nowrap;

    footer {

</style>
