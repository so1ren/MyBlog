{{- define "main" }}

<header class="page-header">
    <h1>
        {{- (printf "%s&nbsp;" .Title ) | htmlUnescape -}}
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
    </h1>
    <div class="post-description" style="font-size:0.95rem;color:var(--secondary);margin-top:0.5rem;">
        按标题、摘要或正文内容检索
    </div>
</header>

<div id="searchbox">
    <input id="searchInput" autofocus placeholder="输入关键词……" aria-label="search" type="search" autocomplete="off" maxlength="64">
    <ul id="searchResults" aria-label="search results">
        <li class="search-empty-state" id="searchEmptyState">
            <span class="search-empty-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </span>
            <span class="search-empty-text">输入关键词，开始在标题、摘要与正文中检索</span>
        </li>
    </ul>
</div>

<style>
/* ── 搜索框区域 ─────────────────────────────── */
#searchbox {
    max-width: 680px;
    margin: 0 auto;
}

#searchInput {
    width: 100%;
    padding: 0.75rem 1.1rem;
    font-size: 1rem;
    font-family: inherit;
    color: var(--content);
    background: var(--entry);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    outline: none;
    box-sizing: border-box;
    transition: border-color 200ms, box-shadow 200ms;
    caret-color: var(--primary);
}
#searchInput:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--primary) 15%, transparent);
}
#searchInput::placeholder {
    color: var(--tertiary);
}

/* ── 结果列表 ───────────────────────────────── */
#searchResults {
    list-style: none;
    margin: 1rem 0 0;
    padding: 0;
}

#searchResults .search-empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
    padding: 3.5rem 1rem;
    color: var(--tertiary);
    border: 1px dashed var(--border);
    border-radius: 8px;
    margin-top: 0.75rem;
}
.search-empty-icon {
    opacity: 0.5;
}
.search-empty-text {
    font-size: 0.9rem;
}

/* 搜索结果条目 */
#searchResults li.post-entry {
    position: relative;
    padding: 0.85rem 1rem 0.85rem 1.25rem;
    border-left: 2px solid var(--border);
    margin-bottom: 0;
    list-style: none;
    transition: border-color 150ms;
}
#searchResults li.post-entry:hover {
    border-left-color: var(--primary);
}
#searchResults li.post-entry:first-child { margin-top: 0.5rem; }
#searchResults li.post-entry:last-child { margin-bottom: 0; }

#searchResults .entry-header {
    font-size: 1rem;
    font-weight: 500;
    color: var(--text-color);
    margin: 0;
    line-height: 1.5;
}

#searchResults li.post-entry a {
    position: absolute;
    inset: 0;
    z-index: 1;
}

/* 无结果状态 */
#searchResults li.search-no-results {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 2.5rem 1rem;
    color: var(--secondary);
    font-size: 0.9rem;
    border: 1px dashed var(--border);
    border-radius: 8px;
    margin-top: 0.75rem;
}

/* ── 搜索结果：文字 hover 不变色（覆盖外部 list.css 的规则） ── */
#searchResults li.post-entry .entry-header,
#searchResults li.post-entry .entry-header:hover,
#searchResults .meta-item,
#searchResults .meta-item:hover {
    color: inherit;
    transition: none;
}
#searchResults a.post-entry-link:hover {
    /* 保留边缘引导线变色，文字本身不变 */
}
</style>

<script src="{{ "assets/js/search.223552a329301ea0e7056102626b22a7e93b2910a1e3efe3130e59fa4b324bf1.js" | absURL }}"></script>
<script>
// 搜索页 UI 状态管理（兼容 fastsearch.js）
(function () {
    var sInput   = document.getElementById('searchInput');
    var resList  = document.getElementById('searchResults');

    // 空状态
    function renderEmpty() {
        resList.innerHTML =
            '<li class="search-empty-state">' +
            '<span class="search-empty-icon"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></span>' +
            '<span class="search-empty-text">输入关键词，开始在标题、摘要与正文中检索</span>' +
            '</li>';
    }

    // 无结果状态
    function renderNoResults() {
        resList.innerHTML = '<li class="search-no-results"><span>没有找到相关内容</span></li>';
    }

    // 每次 keyup：空关键词 → 空状态
    sInput.addEventListener('keyup', function () {
        if (!sInput.value.trim()) {
            renderEmpty();
        }
    });

    // 初始
    renderEmpty();
})();
</script>

{{- end }}{{/* end main */}}
