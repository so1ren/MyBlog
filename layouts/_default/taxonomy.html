{{- define "main" -}}

<header class="series-index-header">
  <h1 class="series-index-title">{{ .Title }}</h1>
  {{- if .Description -}}
  <p class="series-index-sub">{{ .Description }}</p>
  {{- end }}
</header>

<div class="series-card-list">
  {{- range .Pages -}}
    <a href="{{ .Permalink }}" class="series-card-item">
      <div class="series-card-count">
        <span class="series-card-count-n">{{ len .Pages }}</span>
        <span class="series-card-count-label">篇</span>
      </div>
      <div class="series-card-body">
        <h2 class="series-card-name">{{ .Title }}</h2>
        {{- with .Description }}
        <p class="series-card-desc">{{ . }}</p>
        {{- end }}
      </div>
      <span class="series-card-arrow">→</span>
    </a>
  {{- end -}}
</div>

{{- end -}}
