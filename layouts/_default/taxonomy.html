{{- define "main" }}
<header class="page-header">
  <h1>{{ .Title }}</h1>
</header>
<div class="taxonomy-series">
  {{- range .Pages }}
  <div class="taxonomy-item">
    <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
    {{- with .Description }}
    <p>{{ . }}</p>
    {{- end }}
  </div>
  {{- end }}
</div>
{{- end }}
