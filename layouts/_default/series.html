{{- define "main" -}}

<header class="series-header">
  <h1>{{ .Title }}</h1>
  {{- if .Description -}}
  <p class="series-description">{{ .Description }}</p>
  {{- end }}
  <p class="series-meta-count">
    共 <strong>{{ len .Pages }}</strong> 讲
  </p>
</header>

<div class="series-lesson-list">
  {{- range .Pages.ByParam "series_order" -}}
  <a href="{{ .RelPermalink }}" class="series-lesson-item">
    <span class="series-lesson-order">{{ .Params.series_order | default "?" }}</span>
    <div class="series-lesson-body">
      <h3 class="series-lesson-title">{{ .Title }}</h3>
      <p class="series-lesson-date">{{ .Date.Format "2006年01月02日" }}</p>
    </div>
    <span class="series-lesson-arrow">→</span>
  </a>
  {{- end -}}
</div>

{{- end -}}
