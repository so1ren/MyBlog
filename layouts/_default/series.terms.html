{{- /* Series taxonomy index — 极简档案式风格 */ -}}
{{- define "main" }}

<header class="series-index-header">
  <h1 class="series-index-title">专题系列</h1>
  <p class="series-index-sub">长期写作与持续研究的系列专题</p>
</header>

<div class="series-card-list">
  {{- range site.Taxonomies.series }}
    <a href="{{ .Page.Permalink }}" class="series-card-item">
      <div class="series-card-body">
        <h2 class="series-card-name">{{ .Page.Title }}</h2>
        {{- with .Page.Description }}
        <p class="series-card-desc">{{ . }}</p>
        {{- end }}
      </div>
      <span class="series-card-count">{{ len .Pages }} 篇</span>
    </a>
  {{- end }}
</div>

{{- end }}{{- /* end main */ -}}
