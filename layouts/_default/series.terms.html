{{- /* Series taxonomy index — uses list.html structure for full visual consistency */ -}}
{{- define "main" }}

<header class="page-header">
  <h1>{{ .Title }}</h1>
</header>

<div class="post-entries">
  {{- range site.Taxonomies.series }}
    <article class="post-entry">
      <a class="entry-link-area" href="{{ .Page.Permalink }}" aria-label="post link to {{ .Page.Title | plainify }}">
        <header class="entry-header">
          <h2 class="entry-hint-parent">
            {{ .Page.Title }}
          </h2>
        </header>
        {{- with .Page.Description }}
          <div class="entry-content">
            <p>{{ . }}</p>
          </div>
        {{- end }}
      </a>
      <footer class="entry-footer">
        <span class="meta-item meta-reading-time">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
          共 {{ len .Pages }} 篇
        </span>
      </footer>
    </article>
  {{- end }}
</div>

{{- end }}{{- /* end main */ -}}
