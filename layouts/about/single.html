{{- define "main" }}

<main class="about-page">
  <header class="about-header">
    {{ partial "breadcrumbs.html" . }}
    <h1 class="about-title">{{ .Title }}</h1>
    {{- if .Description }}
    <p class="about-lead">{{ .Description }}</p>
    {{- end }}
  </header>

  <div class="about-content-wrapper">
    {{- if .Content }}
    <div class="about-content">
      {{- .Content }}
    </div>
    {{- end }}
  </div>

  {{- if (.Param "comments") }}
  {{- partial "comments.html" . }}
  {{- end }}
</main>

<style>
.about-page {
  max-width: 680px;
  margin: 0 auto;
  padding: 3rem 1.5rem 6rem;
}

.about-header {
  margin-bottom: 3rem;
}

.about-title {
  font-size: 2rem;
  font-weight: 700;
  color: #1a1a1a;
  margin: 0.75rem 0 0;
  line-height: 1.3;
}

.about-lead {
  font-size: 1.05rem;
  color: #555;
  margin: 0.75rem 0 0;
  line-height: 1.7;
  font-style: italic;
}

.about-content-wrapper {
  border-top: 1px solid var(--border);
  padding-top: 2rem;
}

.about-content {
  font-size: 1rem;
  line-height: 1.85;
  color: var(--text-color);
}

.about-content h2 {
  font-size: var(--font-lg);
  font-weight: var(--fw-bold);
  line-height: 1.35;
  margin-top: 2.5em;
  margin-bottom: 0.75em;
  color: var(--text-color);
}

.about-content h3 {
  font-size: var(--font-md);
  font-weight: var(--fw-bold);
  line-height: 1.4;
  margin-top: 2em;
  margin-bottom: 0.5em;
  color: var(--text-color);
}

.about-content p {
  margin: 0 0 1.2rem;
}

.about-content strong {
  font-weight: var(--fw-bold);
  color: var(--accent-bold);
}

.about-content a {
  color: var(--accent-link);
  text-decoration: none;
  border-bottom: 1px solid var(--accent-link);
}

.about-content a:hover {
  border-bottom-color: transparent;
}

.about-content code:not(pre code) {
  color: var(--accent-code);
  background: oklch(97% 0.015 168);
  padding: 0.15em 0.45em;
  border-radius: var(--radius-sm);
  font-size: 0.9em;
  font-weight: var(--fw-normal);
}

.about-content blockquote {
  margin: 24px 0;
  padding: 8px 18px;
  border-inline-start: 2px solid var(--primary-color);
  background: transparent;
  color: var(--text-color);
  font-style: normal;
}
</style>

{{- end }}
