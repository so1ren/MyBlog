baseURL: "https://caiyu.life/"
title: "我的博客"
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

outputs:
  home:
    - HTML
    - RSS
    - JSON # 用于搜索引擎索引

params:
  # 主题模式: auto, light, dark
  defaultTheme: auto
  # 显示修改日期
  showPostNavLinks: true
  # 启用代码高亮
  enableHighlight: true
  # 在主页显示文章摘要
  description: "这是我的博客"

menu:
  main:
    - identifier: categories
      name: 分类
      url: /categories/
      weight: 10
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 20
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 30
    - identifier: search
      name: 搜索
      url: /search/
      weight: 40
    - identifier: about
      name: 关于
      url: /about/
      weight: 50
