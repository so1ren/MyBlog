baseURL: "https://caiyu.life/"
title: "Solren的网络自留地"
theme: PaperMod
languageCode: zh-cn

hasCJKLanguage: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
defaultContentLanguage: zh

minify:
  disableXML: true
  minifyOutput: true

languages:
  zh:
     languageName: "中文"
     taxonomies:
      category: categories
      tag: tags
outputs:
  home:
    - HTML
    - RSS
    - JSON # 用于搜索引擎索引

params:

  author: "So1ren"

  # 主题模式: auto, light, dark
  defaultTheme: auto
  
  # 显示修改日期
  showPostNavLinks: true
  
  # 启用代码高亮
  enableHighlight: true
  
  mainSection:
    - post
  
  dateFormat: "2006年01月02日"
    
  ShowToc: true
  TocOpen: true
  ShowLastMod: true
  ShowReadingTime: true

  assets:
      favicon: "cow.jpg"
      favicon16x16: "cow.jpg"
      favicon32x32: "cow.jpg"
      apple_touch_icon: "cow.jpg"
      safari_pinned_tab: "cow.jpg"

      disableHLJS: false

  profileMode:
    enabled: true
    title: "<Title>" # optional default will be site title
    subtitle: "我思故我在。"
    imageUrl: "cow.jpg" # optional
    imageTitle: "I'm solren" # optional
    imageWidth: 150 # custom size
    imageHeight: 150 # custom size
    
    buttons:
      - name: 文章
        url: "/posts/"
      - name: 关于
        url: "/about/"

  socialIcons:
      - name: github
        url: "https://github.com/so1ren"
      - name: QQ
        url: "qq.jpg"
      - name: email
        url: "mailto:caiyu2001@126.com"
  
  # 搜索
  fuseOpts:
    isCaseSensitive: false # 是否大小写敏感
    shouldSort: true # 是否排序
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0     
    keys: ["title", "permalink", "summary", "content"]
    includeMatches: true

          
menu:
  main:
    - identifier: categories
      name: 分类
      url: /categories/
      weight: 10
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 20
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 30
    - identifier: search
      name: 搜索
      url: /search/
      weight: 40
    - identifier: about
      name: 关于
      url: /about/
      weight: 50


markup:
  highlight:
    noClasses: false
    lineNos: true  # 启用行号
    lineNumbersInTable: false
    codeFolding: true
    codeFoldingInit: "fold"
    style: "github"  # 改为简约的github风格
    tabWidth: 4 
    guessSyntax: true
    # 明确支持的语言
    hl_Languages: [
      "yaml", "yml",
      "bash", "sh", "zsh",
      "html", "xml",
      "javascript", "js=javascript",
      "typescript", "ts=typescript",
      "css", "scss",
      "python", "py=python",
      "go", "golang",
      "java",
      "c", "cpp",
      "rust", "rs=rust",
      "sql",
      "dockerfile", "docker",
      "makefile", "mk=makefile",
      "ini", "toml"
    ]