<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>标签配色方案预览</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      font-size: 18px;
      line-height: 1.8;
      background: #fff;
      color: #4a5568;
      padding: 3rem 2rem;
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 640px; margin: 0 auto; }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #1a202c;
      margin-bottom: 0.5rem;
      letter-spacing: -0.01em;
    }

    .intro {
      font-size: 0.875rem;
      color: #aaa;
      margin-bottom: 2.5rem;
    }

    .option { margin-bottom: 2.5rem; }

    .option-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9b59b6;
      margin-bottom: 0.4rem;
    }

    .option-desc {
      font-size: 0.8rem;
      color: #aaa;
      margin-bottom: 0.75rem;
    }

    .tags { display: flex; flex-wrap: wrap; gap: 0.5rem; }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 0.3rem 0.75rem;
      font-size: 0.85rem;
      font-weight: 500;
      text-decoration: none;
      border-radius: 20px;
      border: 1px solid;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      cursor: default;
    }

    .tag svg { width: 11px; height: 11px; }

    /* ===== A: 蓝色系 ===== */
    .tag-a {
      background: #dbeafe;
      color: #3182ce;
      border-color: rgba(49, 130, 206, 0.2);
    }
    .tag-a:hover {
      border-color: rgba(49, 130, 206, 0.5);
      color: #2c5282;
    }

    /* ===== B: 紫色系 ===== */
    .tag-b {
      background: #f3e8ff;
      color: #7c3aed;
      border-color: rgba(124, 58, 237, 0.2);
    }
    .tag-b:hover {
      border-color: rgba(124, 58, 237, 0.5);
      color: #5b21b6;
    }

    /* ===== C: 绿色系 ===== */
    .tag-c {
      background: #f0fdf4;
      color: #16a34a;
      border-color: rgba(22, 163, 74, 0.2);
    }
    .tag-c:hover {
      border-color: rgba(22, 163, 74, 0.5);
      color: #15803d;
    }

    /* ===== D: 金黄系 ===== */
    .tag-d {
      background: #fef9c3;
      color: #ca8a04;
      border-color: rgba(202, 138, 4, 0.2);
    }
    .tag-d:hover {
      border-color: rgba(202, 138, 4, 0.5);
      color: #a16207;
    }

    /* ===== E: 柔和粉色系 ===== */
    .tag-e {
      background: #fff0f6;
      color: #e879a0;
      border-color: rgba(232, 121, 160, 0.2);
    }
    .tag-e:hover {
      border-color: rgba(232, 121, 160, 0.5);
      color: #c2356b;
    }

    /* ===== F: 灰蓝中性 ===== */
    .tag-f {
      background: #f1f5f9;
      color: #475569;
      border-color: rgba(71, 85, 105, 0.2);
    }
    .tag-f:hover {
      border-color: rgba(71, 85, 105, 0.4);
      color: #1e293b;
    }

    /* ===== G: 蓝绿渐变调 ===== */
    .tag-g {
      background: #ecfeff;
      color: #0891b2;
      border-color: rgba(8, 145, 178, 0.2);
    }
    .tag-g:hover {
      border-color: rgba(8, 145, 178, 0.5);
      color: #0e7490;
    }

    .divider {
      border: none;
      border-top: 1px solid #eaecef;
      margin: 3rem 0;
    }
  </style>
</head>
